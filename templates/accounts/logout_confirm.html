{% extends 'base.html' %}

{% block title %}Logout - Inventory Management System{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow">
            <div class="card-body p-5 text-center">
                <h2 class="card-title mb-4">Logout</h2>
                <p class="mb-4">Are you sure you want to logout?</p>
                
                <form method="post">
                    {% csrf_token %}
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-danger btn-lg">Yes, Logout</button>
                        <a href="{% url 'dashboard' %}" class="btn btn-secondary btn-lg">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
